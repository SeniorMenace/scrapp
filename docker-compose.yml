version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scraper-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - NODE_ENV=production
      - CACHE_TTL=300
      - RATE_LIMIT=10
      - REQUEST_TIMEOUT=8000
      - CORS_ORIGIN=http://localhost:3000
      - PROXY_URL=
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/search?query=test']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scraper-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
    depends_on:
      - backend

networks:
  default:
    name: scraper-network
